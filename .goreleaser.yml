version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kubes
    main: ./cmd/kubes/
    binary: kubes
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: kubes
    repository:
      owner: raihankhan
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/raihankhan/kubes"
    description: "Modern TUI for Kubernetes context and namespace switching."
    license: "Apache-2.0"
    install: |
      bin.install "kubes"
    test: |
      system "#{bin}/kubes", "--version"

scoops:
  - repository:
      owner: raihankhan
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/raihankhan/kubes"
    description: "Modern TUI for Kubernetes context and namespace switching."
    license: "Apache-2.0"

nfpms:
  - id: packages
    package_name: kubes
    homepage: "https://github.com/raihankhan/kubes"
    description: "Modern TUI for Kubernetes context and namespace switching."
    maintainer: "Raihan Khan <your-email@example.com>"
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
